<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>サロン通知設定</title>
  <style>
    body { font-family: sans-serif; padding: 20px; max-width: 400px; margin: 0 auto; }
    .form-group { margin-bottom: 15px; }
    label { display: block; font-weight: bold; margin-bottom: 5px; }
    input[type="text"], input[type="email"], select { width: 100%; padding: 8px; box-sizing: border-box; }
    button { width: 100%; padding: 12px; background-color: #4CAF50; color: white; border: none; font-size: 16px; cursor: pointer; }
    button:disabled { background-color: #cccccc; }
    .hidden-token { display: none; } /* お客様には見せないように隠します */
  </style>
</head>
<body>
  <h2>tiMe and space<br>案内システム登録</h2>
  <p>必要事項を入力し、「登録する」ボタンを押してください。</p>
  
  <form id="registration-form">
    <div class="form-group">
      <label for="customer-name">お名前（フルネーム）</label>
      <input type="text" id="customer-name" required placeholder="山田 太郎">
    </div>

    <div class="form-group">
      <label for="customer-kana">フリガナ</label>
      <input type="text" id="customer-kana" required placeholder="ヤマダ タロウ">
    </div>

    <div class="form-group">
      <label for="customer-email">メールアドレス</label>
      <input type="email" id="customer-email" required placeholder="example@mail.com">
    </div>

    <div class="form-group">
      <label for="notification-type">希望する通知方法</label>
      <select id="notification-type" required>
        <option value="メール">メールで受け取る</option>
        <option value="プッシュ通知">スマホのプッシュ通知で受け取る</option>
      </select>
    </div>

    <input type="hidden" id="token-storage">

    <button type="submit" id="submit-btn">登録する</button>
  </form>

  <script type="module" src="./app.js"></script>
</body>
</html>
